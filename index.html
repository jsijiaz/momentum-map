                    </div>
                  </div>
                );
              })}

              {/* Left label panel */}
              <div style={{width:200,flexShrink:0,position:"relative",zIndex:10}}>
                {["WIN","DIFF","COMPETE","FOUNDATION"].map((layer)=>{
                  if(layer==="FOUNDATION"&&!showFoundation) return null;
                  const isFoundation = layer==="FOUNDATION";
                  const lowerDivKey = layer==="WIN"?"WIN_DIFF":layer==="DIFF"?"DIFF_COMPETE":"COMPETE_FOUNDATION";
                  const topPx = isFoundation
                    ? getDividerY("COMPETE_FOUNDATION") - TOP_PAD + 20
                    : getDividerY(lowerDivKey) - TOP_PAD - 20;
                  const transform = isFoundation ? undefined : "translateY(-100%)";
                  const desc = layerDescriptions[layer]||"";
                  const showDesc = !isFoundation && (hoverLabel===layer || desc);
                  return(
                    <div key={layer} style={{position:"absolute",top:topPx,left:0,width:200,transform}}
                      onMouseEnter={()=>setHoverLabel(layer)} onMouseLeave={()=>setHoverLabel(null)}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#999",textTransform:"uppercase"}}>{layer}</div>
                        <LayerColorPicker color={layerColors[layer]} onChange={c=>updateLayerColor(layer,c)}/>
                      </div>
                      {!isFoundation&&<EditableText value={layerLabels[layer]||""} onChange={v=>updateLayerLabel(layer,v)} style={{fontSize:14,fontWeight:700,color:"#121212",lineHeight:1.35}} placeholder={layer==="WIN"?"Winning Dimension":layer==="DIFF"?"Differentiating Dimension":"Compete Dimension"}/>}
                      {/* Hover description */}
                      {showDesc&&(
                        <div style={{marginTop:5,opacity:hoverLabel===layer?1:0.6,transition:"opacity .15s"}}>
                          <EditableText value={desc} onChange={v=>updateLayerDescription(layer,v)} style={{fontSize:11,color:"#666",fontStyle:"italic",lineHeight:1.4}} placeholder="Add description…"/>
                        </div>
                      )}
                      {/* Remove Foundation button — lives under the FOUNDATION label */}
                      {isFoundation&&(
                        <button onClick={toggleFoundation} style={{marginTop:20,fontSize:9,color:"#aaa",background:"none",border:"1px dashed #ddd",borderRadius:5,padding:"2px 8px",cursor:"pointer",display:"block"}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#aaa"}>Remove Foundation</button>
                      )}
                    </div>
                  );
                })}
                {/* Add Foundation button — only shown when foundation is hidden */}
                {!showFoundation&&(
                  <div style={{position:"absolute",top:getDividerY("COMPETE_FOUNDATION")-TOP_PAD+20,left:0,width:200}}>
                    <button onClick={toggleFoundation} style={{fontSize:9,color:"#888",background:"none",border:"1px dashed #bbb",borderRadius:5,padding:"2px 8px",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e=>e.currentTarget.style.background="none"}>+ Add Foundation</button>
                  </div>
                )}
                <div style={{height:svgPixelH||SVG_H}}/>
              </div>

              {/* SVG Pyramid */}
              <div ref={svgDivRef} style={{flex:1,position:"relative"}}>
                {(()=>{
                  const uid=useMemo(()=>Math.random().toString(36).substr(2,6),[]);
                  return (
                    <>
                    <svg viewBox={`0 0 ${W} ${SVG_H}`} style={{width:"100%",display:"block",overflow:"visible"}}>
                      {["WIN","DIFF","COMPETE"].map(layer=>renderTriLayer(layer,uid))}
                      {showFoundation&&renderFoundation()}
                    </svg>

                    {/* Add block buttons */}
                    {["WIN","DIFF","COMPETE"].map(layer=>{
                      const {y0,y1}=layerY[layer];
                      const midY=(y0+y1)/2;
                      const rx=triRight(midY);
                      return(
                        <button key={layer} onClick={()=>addBlock(layer)} title={`Add block to ${layer}`}
                          style={{position:"absolute",left:`${(rx/W)*100}%`,top:`${(midY/SVG_H)*100}%`,transform:"translate(6px,-50%)",zIndex:10,width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.9)",border:"1.5px dashed #bbb",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#888",boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>
                          {IC.plus}
                        </button>
                      );
                    })}
                    {showFoundation&&<button onClick={()=>addBlock("FOUNDATION")} title="Add block to FOUNDATION"
                      style={{position:"absolute",left:`${(W/W)*100}%`,top:`${((FOUND_Y0+FOUND_Y1)/2/SVG_H)*100}%`,transform:"translate(6px,-50%)",zIndex:10,width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.9)",border:"1.5px dashed #bbb",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#888",boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>
                      {IC.plus}
                    </button>}

                    {/* Hover toolbar — pencil / details / delete */}
                    {hoverBlock&&!editingBlock&&(()=>{
                      const {layer,id}=hoverBlock;
                      if(layer==="FOUNDATION"&&!showFoundation) return null;
                      const blocks=layers[layer]||[];
                      const n=blocks.length;
                      const i=blocks.findIndex(b=>b.id===id);
                      if(i<0) return null;
                      const block=blocks[i];
                      let cx_pct,by0_pct;
                      if(layer==="FOUNDATION"){
                        const c=foundCell(i,n);
                        cx_pct=(c.cx/W)*100; by0_pct=(c.by0/SVG_H)*100;
                      } else {
                        const {y0,y1}=layerY[layer];
                        const c=blockCell(i,n,y0,y1,layer);

                      return(
                        <div style={{position:"absolute",left:`${cx_pct}%`,top:`${by0_pct}%`,transform:"translate(-50%,4px)",zIndex:55,display:"flex",gap:3,pointerEvents:"auto"}}>

                            ···
                          </button>
                          <button title="Delete" onClick={e=>{e.stopPropagation();deleteBlock(layer,id);setHoverBlock(null);}}
                            style={{width:22,height:22,borderRadius:5,background:"rgba(255,255,255,0.96)",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.12)",color:"#ef4444"}}>
                            {IC.trash}
                          </button>
                        </div>
                      );
                    })()}

                    {/* Inline name editor */}
                    {editingBlock&&(!showFoundation&&editingBlock.layer==="FOUNDATION"?null:(()=>{
                      const layer=editingBlock.layer;
                      const blocks=layers[layer]||[];
                      const n=blocks.length;
                      const i=blocks.findIndex(b=>b.id===editingBlock.id);
                      if(i<0) return null;
                      let cx_pct,cy_pct;
                      if(layer==="FOUNDATION"){
                        const {cx,cy}=foundCell(i,n);
                        cx_pct=(cx/W)*100; cy_pct=(cy/SVG_H)*100;
                      } else {
                        const {y0,y1}=layerY[layer];
                        const {cx,cy}=blockCell(i,n,y0,y1,layer);
                        cx_pct=(cx/W)*100; cy_pct=(cy/SVG_H)*100;
                      }
                      return(
                        <div style={{position:"absolute",left:`${cx_pct}%`,top:`${cy_pct}%`,transform:"translate(-50%,-50%)",zIndex:50}}>
                          <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                            onBlur={commitEdit}
                            onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditingBlock(null);}}
                            onClick={e=>e.stopPropagation()}
                            style={{background:"rgba(0,0,0,0.55)",border:"none",outline:"none",color:"#fff",textAlign:"center",fontSize:11,fontWeight:600,borderRadius:4,padding:"3px 8px",minWidth:80,maxWidth:140}}/>
                        </div>
                      );
                    })())}
                    </>
                  );
                })()}
              </div>

              </>);
            })()}
          </div>
        </div>
      </div>

      {/* Block detail popup — rendered outside inner so it doesn't zoom */}
      {activeBlockObj&&activeBlock&&(
        <div ref={popupRef} style={{position:"absolute",bottom:60,right:60,zIndex:300,background:"#fff",border:"1px solid #eee",borderRadius:12,boxShadow:"0 8px 28px rgba(0,0,0,0.15)",padding:"16px 18px",minWidth:260,maxWidth:320}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700}}>{activeBlockObj.name}</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditingBlock(activeBlock);setEditVal(activeBlockObj.name);setActiveBlock(null);}} style={{width:26,height:26,borderRadius:6,background:"#f5f5f5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#555"}} title="Edit name">{IC.pencil}</button>
              <button onClick={()=>{deleteBlock(activeBlock.layer,activeBlock.id);setActiveBlock(null);}} style={{width:26,height:26,borderRadius:6,background:"#fff5f5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444"}} title="Delete">{IC.trash}</button>
              <button onClick={()=>setActiveBlock(null)} style={{width:26,height:26,borderRadius:6,background:"#f5f5f5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#888"}}>{IC.x}</button>
            </div>
          </div>
          <div style={{fontSize:10,color:"#999",marginBottom:4}}>Description</div>
          <textarea value={activeBlockObj.description||""} onChange={e=>updateBlock(activeBlock.layer,activeBlock.id,{description:e.target.value})} placeholder="Add a description…" style={{width:"100%",fontSize:11,border:"1px solid #e5e5e5",borderRadius:6,padding:"6px 8px",resize:"none",outline:"none",lineHeight:1.5}} rows={3}/>
          <div style={{fontSize:10,color:"#999",marginBottom:6,marginTop:10}}>Rating</div>
          <div style={{display:"flex",gap:6}}>
            {["R","Y","G",null].map(r=>(<button key={String(r)} onClick={()=>updateBlock(activeBlock.layer,activeBlock.id,{ryg:activeBlockObj.ryg===r?null:r})} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${activeBlockObj.ryg===r?"#333":"#e0e0e0"}`,background:r?RYG_COLORS[r]:"#f5f5f5",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:r?"#fff":"#999"}} title={r==="R"?"Red":r==="Y"?"Yellow":r==="G"?"Green":"Clear"}>{r||"○"}</button>))}
          </div>
          {(()=>{
            const tagged=(initiatives||[]).filter(i=>i.blockName===activeBlockObj.name&&(i.name||"").trim());
            if(!tagged.length) return null;
            const PROG={"Complete":"#3b82f6","On-track":"#22c55e","Roadblock":"#ef4444","Not Started":"#9ca3af"};
            return(
              <div style={{marginTop:12}}>
                <div style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Momentum Map Initiatives</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:140,overflowY:"auto"}}>
                  {tagged.map(init=>(
                    <div key={init.id} style={{display:"flex",alignItems:"center",gap:7,background:"#f9f9f9",borderRadius:6,padding:"5px 8px"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:PROG[init.progress]||"#d1d5db"}}/>
                      <div style={{flex:1,fontSize:11,fontWeight:600,color:"#222",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{init.name}</div>
                      {init.progress&&<div style={{fontSize:9,color:"#888",flexShrink:0}}>{init.progress}</div>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ── Tab Bar ───────────────────────────────────────────────────────────────
function TabBar({tabs,activeTabId,onSelectTab,onDuplicateTab,onRenameTab,onDeleteTab}) {
  const [editingId,setEditingId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const startEdit=(e,tab)=>{e.stopPropagation();setEditingId(tab.id);setEditVal(tab.name);};
  const commitEdit=()=>{if(editVal.trim())onRenameTab(editingId,editVal.trim());setEditingId(null);};
  return (
    <div className="tab-bar">
      {tabs.map(tab=>(<div key={tab.id} className={`tab-item${tab.id===activeTabId?" active":""}`} onClick={()=>onSelectTab(tab.id)} onDoubleClick={e=>startEdit(e,tab)} title="Double-click to rename">
        {editingId===tab.id?(<input value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditingId(null);}} autoFocus onFocus={e=>e.target.select()} onClick={e=>e.stopPropagation()} style={{fontSize:12,fontWeight:700,border:"none",outline:"none",background:"transparent",width:Math.max(60,editVal.length*8),minWidth:60,maxWidth:140}}/>):(<span>{tab.name}</span>)}
        {tabs.length>1&&(<span onClick={e=>{e.stopPropagation();onDeleteTab(tab.id);}} style={{color:"#ccc",marginLeft:2,display:"inline-flex",padding:"1px 2px",borderRadius:3}} onMouseEnter={e=>e.currentTarget.style.color="#f44"} onMouseLeave={e=>e.currentTarget.style.color="#ccc"}>{IC.xsm}</span>)}
      </div>))}
      {tabs.length<5&&<button className="tab-add" onClick={onDuplicateTab} title="Duplicate current version" style={{display:"flex",alignItems:"center",gap:3,padding:"0 8px",fontSize:11,color:"#888"}}>
        {IC.copy}<span style={{fontSize:10}}>Duplicate</span>
      </button>}
    </div>
  );
}

// ── Top Bar (nav + session) ───────────────────────────────────────────────
function TopBar({sessionId,activeView,onChangeView,onNew,saveStatus}) {
  const [copied,setCopied]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const [draft,setDraft]=useState("");

  const reroll=()=>setDraft(generateSessionId());
  const openModal=()=>{setDraft(generateSessionId());setShowModal(true);};
  const handleDraftChange=e=>setDraft(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,8));
  const handleConfirm=()=>{if(draft.length===8){onNew(draft);setShowModal(false);}};

  const copy=()=>{
    navigator.clipboard?.writeText(window.location.href).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});
  };

  return (
    <>
    {showModal&&(
      <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
        <div className="modal-box" style={{width:360}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:15,fontWeight:700}}>New Session</span>
            <button onClick={()=>setShowModal(false)} style={{color:"#aaa",padding:4}}>{IC.x}</button>
          </div>
          <p style={{fontSize:12,color:"#666",marginBottom:14,lineHeight:1.5}}>Choose an 8-character session ID (A–Z, 0–9), or randomly generate one. This creates a fresh workspace.</p>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input value={draft} onChange={handleDraftChange} maxLength={8}
              style={{flex:1,fontFamily:"monospace",fontSize:18,fontWeight:700,letterSpacing:"0.15em",textAlign:"center",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 12px",outline:"none",textTransform:"uppercase"}}
              onFocus={e=>e.target.style.borderColor="#FF0983"} onBlur={e=>e.target.style.borderColor="#e0e0e0"}
              placeholder="XXXXXXXX"/>
            <button onClick={reroll} title="Random" style={{width:36,height:36,borderRadius:8,border:"1.5px solid #e0e0e0",background:"#fafafa",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background="#f0f0f0"} onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}>
              {IC.refresh}
            </button>
          </div>
          {draft.length>0&&draft.length<8&&<p style={{fontSize:10,color:"#ef4444",marginBottom:8}}>{8-draft.length} more character{8-draft.length!==1?"s":""} needed</p>}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button className="btn-secondary" onClick={()=>setShowModal(false)} style={{flex:1,justifyContent:"center"}}>Cancel</button>
            <button className="btn-primary" onClick={handleConfirm} style={{flex:1,justifyContent:"center",opacity:draft.length===8?1:0.45,cursor:draft.length===8?"pointer":"default"}}>Create Session</button>
          </div>
        </div>
      </div>
    )}
    <div className="top-bar">
      <button className={`nav-tab${activeView==="strategy"?" active":""}`} onClick={()=>onChangeView("strategy")}>{IC.pyramid} Competitive Strategy</button>
      <button className={`nav-tab${activeView==="map"?" active":""}`} onClick={()=>onChangeView("map")}>{IC.map} Momentum Map</button>
      <div style={{flex:1}}/>
      {saveStatus&&<span className={`save-indicator${saveStatus?" "+saveStatus:""}`}>{saveStatus==="saving"?"Saving…":saveStatus==="saved"?"Saved ✓":""}</span>}
      <span style={{color:"#aaa",fontSize:11}}>Session:</span>
      <span style={{fontFamily:"monospace",fontWeight:700,color:"#555",fontSize:11,letterSpacing:"0.05em"}}>{sessionId}</span>
      <button onClick={copy} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#888",border:"1px solid #e0e0e0",borderRadius:6,padding:"3px 9px",background:"#fff",cursor:"pointer"}}
        onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
        {IC.copy}{copied?"Copied!":"Copy link"}
      </button>
      <button onClick={openModal} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#FF0983",border:"1px solid #FF098344",borderRadius:6,padding:"3px 9px",background:"#fff",cursor:"pointer"}}
        onMouseEnter={e=>e.currentTarget.style.background="#fff0f8"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
        + New session
      </button>
    </div>
    </>
  );
}

// ── Map View ──────────────────────────────────────────────────────────────
function MapView({tab,onUpdate,saveStatus}) {
  const {initiatives,horizons,settings,displayFields,fontSize,labelWidth,pyramid}=tab;
  const [draggingInit,setDraggingInit]=useState(null);
  const [panelWidth,setPanelWidth]=useState(310);
  const panelDragRef=useRef({active:false,startX:0,startW:310});

  const handlePanelEdgeDown=useCallback(e=>{
    e.preventDefault(); e.stopPropagation();
    panelDragRef.current={active:true,startX:e.clientX,startW:panelWidth};
    const onMove=me=>{
      const dx=me.clientX-panelDragRef.current.startX;
      setPanelWidth(Math.max(220,Math.min(540,panelDragRef.current.startW-dx)));
    };
    const onUp=()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  },[panelWidth]);

  const addInitiative=initOrArray=>{const newInits=Array.isArray(initOrArray)?initOrArray:[initOrArray];onUpdate({initiatives:[...initiatives,...newInits]});};
  const deleteInitiative=id=>onUpdate({initiatives:initiatives.filter(i=>i.id!==id)});
  const updateInitiative=(id,changes)=>onUpdate({initiatives:initiatives.map(i=>i.id===id?{...i,...changes}:i)});
  const toggleField=key=>{if(key==="name")return;onUpdate({displayFields:displayFields.includes(key)?displayFields.filter(f=>f!==key):[...displayFields,key]});};
  return (
    <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        <SettingsBar settings={settings} horizons={horizons} displayFields={displayFields} fontSize={fontSize} saveStatus={saveStatus} onToggleField={toggleField} onUpdateSettings={d=>onUpdate({settings:{...settings,...d}})} onUpdateHorizons={h=>onUpdate({horizons:h})} onFontSizeChange={fs=>onUpdate({fontSize:fs})} labelWidth={labelWidth} onLabelWidthChange={w=>onUpdate({labelWidth:w})}/>
        <MomentumCanvas initiatives={initiatives} horizons={horizons} settings={settings} displayFields={displayFields} fontSize={fontSize} labelWidth={labelWidth} draggingInit={draggingInit} onDrop={init=>updateInitiative(init.id,{onMap:true,offsetY:0})} onUpdateInitiative={updateInitiative}/>
      </div>
      <InitiativePanel initiatives={initiatives} onAdd={addInitiative} onDelete={deleteInitiative} onUpdate={updateInitiative} onDragStart={setDraggingInit} onDragEnd={()=>setDraggingInit(null)} pyramid={pyramid||makeDefaultPyramid()} syncUrl={tab.syncUrl||null} onSetSyncUrl={url=>onUpdate({syncUrl:url})} panelWidth={panelWidth} onPanelEdgeDown={handlePanelEdgeDown}/>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────
function App() {
  // Session ID from URL hash or generate new
  const [sessionId,setSessionId]=useState(()=>{
    const existing=getOrCreateSessionId();
    if(existing){ return existing; }
    const newId=generateSessionId();
    setSessionInHash(newId);
    return newId;
  });

  const [tabs,setTabs]=useState([makeDefaultTab("Version 1")]);
  const [activeTabId,setActiveTabId]=useState(null);
  const [activeView,setActiveView]=useState("map");
  const [loaded,setLoaded]=useState(false);
  const [saveStatus,setSaveStatus]=useState("");
  const saveTimer=useRef(null);

  const LS_KEY=`momap_${sessionId}`;
  function loadFromLocalStorage() {
    try { const raw=localStorage.getItem(LS_KEY); return raw?JSON.parse(raw):null; } catch(e){ return null; }
  }
  function saveToLocalStorage(data) {
    try { localStorage.setItem(LS_KEY,JSON.stringify(data)); } catch(e){}
  }

  // Load state keyed by sessionId
  useEffect(()=>{
    if(!sessionId) return;
    fetch(`${API}/api/state`,{headers:{"x-session-id":sessionId}})
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        const source = (data&&data.tabs&&data.tabs.length>0) ? data : loadFromLocalStorage();
        if(source&&source.tabs&&source.tabs.length>0){
          const migrated=source.tabs.map(t=>({...makeDefaultTab(""),... t,pyramid:t.pyramid||makeDefaultPyramid(),initiatives:(t.initiatives||[]).map(i=>({owner:null,progress:null,blockName:null,...i}))}));
          setTabs(migrated);
          setActiveTabId(source.activeTabId||migrated[0].id);
          if(source.activeView) setActiveView(source.activeView);
        } else {
          const t=makeDefaultTab("Version 1");
          setTabs([t]);setActiveTabId(t.id);
        }
        setLoaded(true);
      })
      .catch(()=>{
        const source=loadFromLocalStorage();
        if(source&&source.tabs&&source.tabs.length>0){
          const migrated=source.tabs.map(t=>({...makeDefaultTab(""),... t,pyramid:t.pyramid||makeDefaultPyramid(),initiatives:(t.initiatives||[]).map(i=>({owner:null,progress:null,blockName:null,...i}))}));
          setTabs(migrated);
          setActiveTabId(source.activeTabId||migrated[0].id);
          if(source.activeView) setActiveView(source.activeView);
        } else {
          const t=makeDefaultTab("Version 1");setTabs([t]);setActiveTabId(t.id);
        }
        setLoaded(true);
      });
  },[sessionId]);

  // Debounced save keyed by sessionId
  useEffect(()=>{
    if(!loaded) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current=setTimeout(()=>{
      const stateData={tabs,activeTabId,activeView};
      saveToLocalStorage(stateData);
      fetch(`${API}/api/state`,{method:"POST",headers:{"Content-Type":"application/json","x-session-id":sessionId},body:JSON.stringify({state:stateData})})
        .then(()=>{setSaveStatus("saved");setTimeout(()=>setSaveStatus(""),2000);})
        .catch(()=>{setSaveStatus("saved");setTimeout(()=>setSaveStatus(""),2000);});
    },800);
    return()=>{if(saveTimer.current)clearTimeout(saveTimer.current);};
  },[tabs,activeTabId,activeView,loaded,sessionId]);

  const activeTab=tabs.find(t=>t.id===activeTabId)||tabs[0];
  const updateActiveTab=changes=>setTabs(prev=>prev.map(t=>t.id===(activeTabId||tabs[0].id)?{...t,...changes}:t));
  const duplicateTab=()=>{
    if(tabs.length>=5) return;
    const src=tabs.find(t=>t.id===(activeTabId||tabs[0].id))||tabs[0];
    const copy=JSON.parse(JSON.stringify(src));
    copy.id=genId(); copy.name=src.name+" (copy)";
    setTabs(prev=>[...prev,copy]); setActiveTabId(copy.id);
  };
  const deleteTab=id=>setTabs(prev=>{const next=prev.filter(t=>t.id!==id);if(next.length===0){const t=makeDefaultTab("Version 1");setActiveTabId(t.id);return[t];}if(id===activeTabId)setActiveTabId(next[0].id);return next;});
  const renameTab=(id,name)=>setTabs(prev=>prev.map(t=>t.id===id?{...t,name}:t));

  const handleNewSession=(customId)=>{
    const newId=customId||generateSessionId();
    setSessionInHash(newId);
    setSessionId(newId);
    setLoaded(false);
    const t=makeDefaultTab("Version 1");
    setTabs([t]);setActiveTabId(t.id);setLoaded(true);
  };

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#888",fontSize:13}}>Loading…</div>;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",width:"100vw",overflow:"hidden",fontFamily:"'Switzer','Inter',sans-serif"}}>
      <TopBar sessionId={sessionId} activeView={activeView} onChangeView={setActiveView} onNew={handleNewSession} saveStatus={saveStatus}/>
      <div style={{flex:1,minHeight:0,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {activeView==="map"?(
            <MapView key={activeTabId} tab={activeTab} onUpdate={updateActiveTab} saveStatus={saveStatus}/>
          ):(
            <CompetitiveStrategyView pyramid={activeTab?.pyramid||makeDefaultPyramid()} onUpdatePyramid={changes=>updateActiveTab({pyramid:{...(activeTab?.pyramid||makeDefaultPyramid()),...changes}})} initiatives={activeTab?.initiatives||[]} settings={activeTab?.settings||{}}/>
          )}
        </div>
      </div>
      <TabBar tabs={tabs} activeTabId={activeTabId||tabs[0].id} onSelectTab={setActiveTabId} onDuplicateTab={duplicateTab} onRenameTab={renameTab} onDeleteTab={deleteTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
